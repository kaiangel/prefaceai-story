<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>序话Story - 创建故事 (对话式)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Plus Jakarta Sans', 'system-ui', sans-serif],
          },
          colors: {
            primary: '#2563EB',
            'primary-hover': '#1D4ED8',
            cta: '#F97316',
            'cta-hover': '#EA580C',
            'ai-bubble': '#F1F5F9',
            'user-bubble': '#2563EB',
            'text-primary': '#1E293B',
            'text-secondary': '#64748B',
            'text-muted': '#94A3B8',
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Plus Jakarta Sans', system-ui, sans-serif; }
    .message-enter { animation: messageSlideIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
    @keyframes messageSlideIn {
      from { opacity: 0; transform: translateY(20px) scale(0.95); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    .option-bounce { animation: optionBounce 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); }
    @keyframes optionBounce {
      0% { opacity: 0; transform: scale(0.8); }
      60% { transform: scale(1.05); }
      100% { opacity: 1; transform: scale(1); }
    }
    .typing-dot { animation: typingPulse 1.4s infinite ease-in-out; }
    .typing-dot:nth-child(1) { animation-delay: 0s; }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typingPulse {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-4px); opacity: 1; }
    }
    .chat-container { scroll-behavior: smooth; }
    .option-card { transition: all 200ms ease; }
    .option-card:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(37, 99, 235, 0.15); }
    .option-card.selected { border-color: #2563EB; background-color: #EFF6FF; }
  </style>
</head>
<body class="bg-white text-text-primary min-h-screen flex flex-col">

  <nav class="fixed top-0 left-0 right-0 z-50 bg-white border-b border-slate-200">
    <div class="max-w-2xl mx-auto px-4 h-14 flex items-center justify-between">
      <div class="flex items-center gap-2">
        <div class="w-8 h-8 bg-gradient-to-br from-primary to-cta rounded-lg"></div>
        <span class="font-semibold">序话Story</span>
      </div>
      <div class="w-8 h-8 bg-slate-100 rounded-full flex items-center justify-center">
        <i data-lucide="user" class="w-4 h-4 text-slate-500"></i>
      </div>
    </div>
  </nav>

  <main class="flex-1 pt-14 pb-20 overflow-hidden">
    <div id="chat-container" class="chat-container h-full overflow-y-auto px-4 py-6">
      <div class="max-w-2xl mx-auto space-y-4" id="messages"></div>
    </div>
  </main>

  <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 px-4 py-3">
    <div class="max-w-2xl mx-auto">
      <div class="flex items-center gap-3">
        <input type="text" id="user-input" class="flex-1 px-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl text-text-primary placeholder:text-text-muted focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all" placeholder="说说你想讲的故事..." />
        <button id="send-btn" onclick="handleUserInput()" class="w-12 h-12 bg-primary hover:bg-primary-hover text-white rounded-full flex items-center justify-center transition-all cursor-pointer shadow-lg shadow-primary/25">
          <i data-lucide="send" class="w-5 h-5"></i>
        </button>
      </div>
      <p class="text-center text-text-muted text-xs mt-2">按 Enter 发送</p>
    </div>
  </div>

  <div id="generation-modal" class="fixed inset-0 bg-black/50 z-50 hidden items-center justify-center">
    <div class="bg-white rounded-2xl p-8 max-w-md w-full mx-4 shadow-2xl">
      <div class="text-center">
        <div class="w-16 h-16 bg-gradient-to-br from-primary to-cta rounded-full mx-auto mb-6 flex items-center justify-center animate-pulse">
          <i data-lucide="sparkles" class="w-8 h-8 text-white"></i>
        </div>
        <h2 class="text-xl font-semibold mb-2">正在创作你的故事</h2>
        <p class="text-text-secondary mb-6">AI正在施展魔法，请稍候...</p>
        <div class="w-full bg-slate-100 rounded-full h-2 mb-4">
          <div id="progress-bar" class="bg-gradient-to-r from-primary to-cta h-2 rounded-full transition-all duration-500" style="width: 0%"></div>
        </div>
        <div class="text-left space-y-2 text-sm" id="status-list">
          <div id="status-1" class="flex items-center gap-2 text-text-muted"><div id="status-1-icon" class="w-4 h-4 border-2 border-current rounded-full"></div><span>生成角色设计</span></div>
          <div id="status-2" class="flex items-center gap-2 text-text-muted"><div id="status-2-icon" class="w-4 h-4 border-2 border-current rounded-full"></div><span>编写分场剧本</span></div>
          <div id="status-3" class="flex items-center gap-2 text-text-muted"><div id="status-3-icon" class="w-4 h-4 border-2 border-current rounded-full"></div><span>绘制分镜画面</span></div>
          <div id="status-4" class="flex items-center gap-2 text-text-muted"><div id="status-4-icon" class="w-4 h-4 border-2 border-current rounded-full"></div><span>合成语音旁白</span></div>
          <div id="status-5" class="flex items-center gap-2 text-text-muted"><div id="status-5-icon" class="w-4 h-4 border-2 border-current rounded-full"></div><span>生成最终视频</span></div>
        </div>
        <p class="text-text-muted text-xs mt-6">你可以离开页面，完成后会通知你</p>
      </div>
    </div>
  </div>

  <script>
    lucide.createIcons();

    var conversationState = 'initial';
    var storyData = { idea: '', style: '', mood: '', voice: '', title: '' };

    document.addEventListener('DOMContentLoaded', function() {
      setTimeout(function() {
        addAIMessage('你好！我是序话Story，帮你把想法变成精彩短视频。');
        setTimeout(function() {
          addAIMessage('告诉我，你想讲一个什么样的故事？可以是一句话，也可以是一个场景、一个情绪...');
          addInspirationChips();
        }, 800);
      }, 500);

      document.getElementById('user-input').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') handleUserInput();
      });
    });

    function createAIAvatar() {
      var avatar = document.createElement('div');
      avatar.className = 'w-8 h-8 bg-gradient-to-br from-primary to-cta rounded-full flex-shrink-0 flex items-center justify-center';
      var svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      svg.setAttribute('class', 'w-4 h-4 text-white');
      svg.setAttribute('viewBox', '0 0 24 24');
      svg.setAttribute('fill', 'none');
      svg.setAttribute('stroke', 'currentColor');
      svg.setAttribute('stroke-width', '2');
      var path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      path.setAttribute('d', 'M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z');
      svg.appendChild(path);
      avatar.appendChild(svg);
      return avatar;
    }

    function addAIMessage(text) {
      var container = document.getElementById('messages');
      var wrapper = document.createElement('div');
      wrapper.className = 'flex items-start gap-3 message-enter';
      wrapper.appendChild(createAIAvatar());
      var bubble = document.createElement('div');
      bubble.className = 'bg-ai-bubble rounded-2xl rounded-tl-md px-4 py-3 max-w-md';
      var textEl = document.createElement('p');
      textEl.className = 'text-text-primary';
      textEl.textContent = text;
      bubble.appendChild(textEl);
      wrapper.appendChild(bubble);
      container.appendChild(wrapper);
      scrollToBottom();
    }

    function addUserMessage(text) {
      var container = document.getElementById('messages');
      var wrapper = document.createElement('div');
      wrapper.className = 'flex items-start gap-3 justify-end message-enter';
      var bubble = document.createElement('div');
      bubble.className = 'bg-user-bubble text-white rounded-2xl rounded-tr-md px-4 py-3 max-w-md';
      var p = document.createElement('p');
      p.textContent = text;
      bubble.appendChild(p);
      wrapper.appendChild(bubble);
      container.appendChild(wrapper);
      scrollToBottom();
    }

    function addTypingIndicator() {
      var container = document.getElementById('messages');
      var wrapper = document.createElement('div');
      wrapper.className = 'flex items-start gap-3';
      wrapper.id = 'typing-indicator';
      wrapper.appendChild(createAIAvatar());
      var bubble = document.createElement('div');
      bubble.className = 'bg-ai-bubble rounded-2xl rounded-tl-md px-4 py-3 flex gap-1';
      for (var i = 0; i < 3; i++) {
        var dot = document.createElement('span');
        dot.className = 'typing-dot w-2 h-2 bg-text-muted rounded-full';
        bubble.appendChild(dot);
      }
      wrapper.appendChild(bubble);
      container.appendChild(wrapper);
      scrollToBottom();
    }

    function removeTypingIndicator() {
      var el = document.getElementById('typing-indicator');
      if (el) el.remove();
    }

    function addInspirationChips() {
      var container = document.getElementById('messages');
      var wrapper = document.createElement('div');
      wrapper.className = 'flex flex-wrap gap-2 pl-11 message-enter';
      var inspirations = ['流浪猫找到新家', '程序员遇见女医生', '外星人看广场舞', '小镇女孩追梦'];
      inspirations.forEach(function(text, i) {
        var chip = document.createElement('button');
        chip.className = 'px-3 py-1.5 bg-white border border-slate-200 hover:border-primary hover:text-primary rounded-full text-sm transition-all cursor-pointer option-bounce';
        chip.style.animationDelay = (i * 0.1) + 's';
        chip.textContent = text;
        chip.onclick = function() { setIdeaFromChip(text); };
        wrapper.appendChild(chip);
      });
      container.appendChild(wrapper);
      scrollToBottom();
    }

    function setIdeaFromChip(text) {
      document.getElementById('user-input').value = text;
      handleUserInput();
    }

    function addStyleOptions() {
      var container = document.getElementById('messages');
      var wrapper = document.createElement('div');
      wrapper.className = 'grid grid-cols-2 gap-3 pl-11 max-w-md message-enter';
      var styles = [
        { id: 'realistic', name: '写实', desc: '真实感摄影', icon: 'camera', gradient: 'from-slate-400 to-slate-600' },
        { id: 'cartoon', name: '3D卡通', desc: '皮克斯风格', icon: 'smile', gradient: 'from-blue-400 to-purple-500' },
        { id: 'anime', name: '日式动漫', desc: '动漫美学', icon: 'sparkles', gradient: 'from-pink-400 to-rose-500' },
        { id: 'ink', name: '水墨', desc: '中国传统', icon: 'pen-tool', gradient: 'from-gray-300 to-gray-500' }
      ];
      styles.forEach(function(style, i) {
        var card = document.createElement('button');
        card.className = 'option-card bg-white border-2 border-slate-200 rounded-xl p-3 text-left cursor-pointer option-bounce';
        card.style.animationDelay = (i * 0.1) + 's';
        var iconDiv = document.createElement('div');
        iconDiv.className = 'w-10 h-10 bg-gradient-to-br ' + style.gradient + ' rounded-lg mb-2 flex items-center justify-center';
        var iconEl = document.createElement('i');
        iconEl.setAttribute('data-lucide', style.icon);
        iconEl.className = 'w-5 h-5 text-white';
        iconDiv.appendChild(iconEl);
        card.appendChild(iconDiv);
        var nameP = document.createElement('p');
        nameP.className = 'font-medium text-sm';
        nameP.textContent = style.name;
        card.appendChild(nameP);
        var descP = document.createElement('p');
        descP.className = 'text-text-muted text-xs';
        descP.textContent = style.desc;
        card.appendChild(descP);
        card.onclick = function() { selectStyle(style.id, style.name); };
        wrapper.appendChild(card);
      });
      container.appendChild(wrapper);
      lucide.createIcons();
      scrollToBottom();
    }

    function addMoodOptions() {
      var container = document.getElementById('messages');
      var wrapper = document.createElement('div');
      wrapper.className = 'flex flex-wrap gap-2 pl-11 message-enter';
      var moods = ['温馨治愈', '伤感催泪', '紧张刺激', '搞笑欢乐', '励志热血', '悬疑烧脑'];
      moods.forEach(function(mood, i) {
        var chip = document.createElement('button');
        chip.className = 'px-4 py-2 bg-white border border-slate-200 hover:border-primary hover:bg-blue-50 rounded-full text-sm transition-all cursor-pointer option-bounce';
        chip.style.animationDelay = (i * 0.08) + 's';
        chip.textContent = mood;
        chip.onclick = function() { selectMood(mood); };
        wrapper.appendChild(chip);
      });
      container.appendChild(wrapper);
      scrollToBottom();
    }

    function addVoiceOptions() {
      var container = document.getElementById('messages');
      var wrapper = document.createElement('div');
      wrapper.className = 'flex gap-3 pl-11 message-enter';
      var voices = [
        { id: 'female', name: '温柔女声', desc: '适合治愈故事', gradient: 'from-pink-400 to-rose-400' },
        { id: 'male', name: '磁性男声', desc: '适合冒险故事', gradient: 'from-blue-400 to-indigo-400' }
      ];
      voices.forEach(function(voice, i) {
        var card = document.createElement('button');
        card.className = 'option-card flex-1 bg-white border-2 border-slate-200 rounded-xl p-3 flex items-center gap-3 cursor-pointer option-bounce';
        card.style.animationDelay = (i * 0.1) + 's';
        var iconDiv = document.createElement('div');
        iconDiv.className = 'w-10 h-10 bg-gradient-to-br ' + voice.gradient + ' rounded-full flex items-center justify-center';
        var iconEl = document.createElement('i');
        iconEl.setAttribute('data-lucide', 'user');
        iconEl.className = 'w-5 h-5 text-white';
        iconDiv.appendChild(iconEl);
        card.appendChild(iconDiv);
        var textDiv = document.createElement('div');
        textDiv.className = 'text-left';
        var nameP = document.createElement('p');
        nameP.className = 'font-medium text-sm';
        nameP.textContent = voice.name;
        textDiv.appendChild(nameP);
        var descP = document.createElement('p');
        descP.className = 'text-text-muted text-xs';
        descP.textContent = voice.desc;
        textDiv.appendChild(descP);
        card.appendChild(textDiv);
        card.onclick = function() { selectVoice(voice.id, voice.name); };
        wrapper.appendChild(card);
      });
      container.appendChild(wrapper);
      lucide.createIcons();
      scrollToBottom();
    }

    function addOutlinePreview() {
      var container = document.getElementById('messages');
      var wrapper = document.createElement('div');
      wrapper.className = 'pl-11 max-w-md message-enter';

      var card = document.createElement('div');
      card.className = 'bg-white border border-slate-200 rounded-2xl overflow-hidden shadow-sm';

      var header = document.createElement('div');
      header.className = 'p-4 border-b border-slate-100';
      var title = document.createElement('h3');
      title.className = 'font-semibold text-lg';
      title.textContent = storyData.title;
      header.appendChild(title);
      var meta = document.createElement('p');
      meta.className = 'text-text-muted text-sm mt-1';
      meta.textContent = storyData.style + ' · ' + storyData.mood + ' · ' + storyData.voice;
      header.appendChild(meta);
      card.appendChild(header);

      var body = document.createElement('div');
      body.className = 'p-4 space-y-3';

      var charSection = document.createElement('div');
      var charLabel = document.createElement('p');
      charLabel.className = 'text-text-muted text-xs mb-2';
      charLabel.textContent = '角色';
      charSection.appendChild(charLabel);
      var charList = document.createElement('div');
      charList.className = 'flex gap-2';
      [{ name: '李明', color: 'from-blue-400 to-blue-600' }, { name: '张薇', color: 'from-pink-400 to-rose-500' }].forEach(function(c) {
        var charItem = document.createElement('div');
        charItem.className = 'flex items-center gap-2 bg-slate-50 rounded-lg px-3 py-2';
        var avatar = document.createElement('div');
        avatar.className = 'w-8 h-8 bg-gradient-to-br ' + c.color + ' rounded-full';
        charItem.appendChild(avatar);
        var name = document.createElement('span');
        name.className = 'text-sm';
        name.textContent = c.name;
        charItem.appendChild(name);
        charList.appendChild(charItem);
      });
      charSection.appendChild(charList);
      body.appendChild(charSection);

      var plotSection = document.createElement('div');
      var plotLabel = document.createElement('p');
      plotLabel.className = 'text-text-muted text-xs mb-2';
      plotLabel.textContent = '情节线';
      plotSection.appendChild(plotLabel);
      var plotList = document.createElement('div');
      plotList.className = 'space-y-2';
      ['李明加班到深夜，疲惫地走进便利店', '泡面区偶遇同样疲惫的张薇', '两人相视而笑，开始聊天', '互相鼓励，带着微笑各自离开'].forEach(function(p, i) {
        var item = document.createElement('div');
        item.className = 'flex items-center gap-2 text-sm';
        var num = document.createElement('span');
        num.className = 'w-5 h-5 bg-primary/10 text-primary rounded-full flex items-center justify-center text-xs';
        num.textContent = (i + 1);
        item.appendChild(num);
        var text = document.createTextNode(p);
        item.appendChild(text);
        plotList.appendChild(item);
      });
      plotSection.appendChild(plotList);
      body.appendChild(plotSection);
      card.appendChild(body);

      var footer = document.createElement('div');
      footer.className = 'p-4 bg-slate-50 flex gap-2';
      var editBtn = document.createElement('button');
      editBtn.className = 'flex-1 py-2 border border-slate-200 bg-white rounded-lg text-sm hover:border-primary transition-all cursor-pointer';
      editBtn.textContent = '调整大纲';
      editBtn.onclick = editOutline;
      footer.appendChild(editBtn);
      var genBtn = document.createElement('button');
      genBtn.className = 'flex-1 py-2 bg-cta hover:bg-cta-hover text-white rounded-lg text-sm font-medium transition-all cursor-pointer';
      genBtn.textContent = '开始生成';
      genBtn.onclick = startGeneration;
      footer.appendChild(genBtn);
      card.appendChild(footer);

      wrapper.appendChild(card);
      container.appendChild(wrapper);
      scrollToBottom();
    }

    function selectStyle(id, name) {
      storyData.style = name;
      addUserMessage('我选 ' + name);
      setTimeout(function() {
        addTypingIndicator();
        setTimeout(function() {
          removeTypingIndicator();
          addAIMessage(name + '风格很棒！这个故事是什么情绪基调呢？');
          setTimeout(function() { addMoodOptions(); }, 300);
          conversationState = 'mood';
        }, 1000);
      }, 300);
    }

    function selectMood(mood) {
      storyData.mood = mood;
      addUserMessage(mood);
      setTimeout(function() {
        addTypingIndicator();
        setTimeout(function() {
          removeTypingIndicator();
          addAIMessage('最后一步！选择旁白语音：');
          setTimeout(function() { addVoiceOptions(); }, 300);
          conversationState = 'voice';
        }, 1000);
      }, 300);
    }

    function selectVoice(id, name) {
      storyData.voice = name;
      addUserMessage(name);
      setTimeout(function() {
        addTypingIndicator();
        setTimeout(function() {
          removeTypingIndicator();
          storyData.title = '《深夜便利店》';
          addAIMessage('太好了！我已经为你生成了故事大纲，看看是否满意？');
          setTimeout(function() { addOutlinePreview(); }, 300);
          conversationState = 'outline';
        }, 1500);
      }, 300);
    }

    function handleUserInput() {
      var input = document.getElementById('user-input');
      var text = input.value.trim();
      if (!text) return;
      input.value = '';
      if (conversationState === 'initial') {
        storyData.idea = text;
        addUserMessage(text);
        setTimeout(function() {
          addTypingIndicator();
          setTimeout(function() {
            removeTypingIndicator();
            addAIMessage('这是个很棒的想法！感觉是个治愈系的故事呢。');
            setTimeout(function() {
              addAIMessage('选一个视觉风格吧：');
              setTimeout(function() { addStyleOptions(); }, 300);
            }, 600);
            conversationState = 'style';
          }, 1200);
        }, 300);
      }
    }

    function editOutline() {
      addUserMessage('我想调整一下');
      setTimeout(function() {
        addTypingIndicator();
        setTimeout(function() {
          removeTypingIndicator();
          addAIMessage('好的！你可以直接告诉我想修改哪里，比如"把男主角改成女生"或"结局改成伤感的"');
          conversationState = 'editing';
        }, 800);
      }, 300);
    }

    function startGeneration() {
      var modal = document.getElementById('generation-modal');
      modal.classList.remove('hidden');
      modal.classList.add('flex');
      var statuses = [
        { id: 'status-1', iconId: 'status-1-icon', progress: 20 },
        { id: 'status-2', iconId: 'status-2-icon', progress: 40 },
        { id: 'status-3', iconId: 'status-3-icon', progress: 60 },
        { id: 'status-4', iconId: 'status-4-icon', progress: 80 },
        { id: 'status-5', iconId: 'status-5-icon', progress: 100 }
      ];
      var currentStatus = 0;
      var interval = setInterval(function() {
        if (currentStatus < statuses.length) {
          var status = statuses[currentStatus];
          document.getElementById('progress-bar').style.width = status.progress + '%';
          document.getElementById(status.id).classList.remove('text-text-muted');
          document.getElementById(status.id).classList.add('text-primary');
          var icon = document.getElementById(status.iconId);
          icon.textContent = '\u2713';
          icon.classList.add('bg-primary', 'text-white', 'text-xs', 'flex', 'items-center', 'justify-center');
          icon.classList.remove('border-2', 'border-current');
          currentStatus++;
        } else {
          clearInterval(interval);
          setTimeout(function() {
            alert('视频生成完成！\n\n（这是概念原型，实际产品会跳转到预览页面）');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
          }, 500);
        }
      }, 1500);
    }

    function scrollToBottom() {
      var container = document.getElementById('chat-container');
      setTimeout(function() { container.scrollTop = container.scrollHeight; }, 100);
    }
  </script>
</body>
</html>
