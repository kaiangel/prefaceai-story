<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>创建故事 - 实时预览版 | 序话Story</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        /* 自定义滚动条 */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #CBD5E1;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94A3B8;
        }

        /* 预览内容淡入动画 */
        .preview-fade-in {
            animation: previewFadeIn 0.4s ease-out;
        }

        @keyframes previewFadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 预览内容更新闪烁 */
        .preview-update {
            animation: previewUpdate 0.6s ease-out;
        }

        @keyframes previewUpdate {
            0% {
                background-color: rgba(99, 102, 241, 0.1);
            }
            100% {
                background-color: transparent;
            }
        }

        /* 风格卡片选中效果 */
        .style-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .style-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px -5px rgba(0, 0, 0, 0.1);
        }
        .style-card.selected {
            border-color: #6366F1;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.05), rgba(99, 102, 241, 0.1));
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        /* 情绪标签选中效果 */
        .mood-chip {
            transition: all 0.2s ease;
        }
        .mood-chip:hover {
            transform: scale(1.05);
        }
        .mood-chip.selected {
            background: #6366F1;
            color: white;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        /* 声音选项选中效果 */
        .voice-option {
            transition: all 0.2s ease;
        }
        .voice-option:hover {
            border-color: #6366F1;
        }
        .voice-option.selected {
            border-color: #6366F1;
            background: rgba(99, 102, 241, 0.05);
        }
        .voice-option.selected .voice-check {
            display: flex;
        }

        /* 预览区域样式切换 */
        .preview-panel {
            transition: background 0.5s ease, color 0.5s ease;
        }

        /* 角色头像动画 */
        .character-avatar {
            animation: avatarPop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes avatarPop {
            from {
                transform: scale(0);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* 场景卡片动画 */
        .scene-card {
            animation: sceneSlide 0.4s ease-out;
        }

        @keyframes sceneSlide {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* 输入框焦点效果 */
        .idea-input:focus {
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        /* 生成按钮渐变 */
        .generate-btn {
            background: linear-gradient(135deg, #6366F1, #8B5CF6);
            transition: all 0.3s ease;
        }
        .generate-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 30px -5px rgba(99, 102, 241, 0.4);
        }
        .generate-btn:active {
            transform: translateY(0);
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">
    <!-- 顶部导航 -->
    <nav class="bg-white border-b border-slate-200 px-6 py-4 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-xl flex items-center justify-center">
                    <i data-lucide="sparkles" class="w-5 h-5 text-white"></i>
                </div>
                <span class="text-xl font-bold text-slate-900">序话Story</span>
            </div>
            <div class="flex items-center gap-4">
                <button class="text-slate-500 hover:text-slate-700 transition-colors">
                    <i data-lucide="help-circle" class="w-5 h-5"></i>
                </button>
                <div class="w-8 h-8 bg-gradient-to-br from-indigo-100 to-purple-100 rounded-full flex items-center justify-center">
                    <i data-lucide="user" class="w-4 h-4 text-indigo-600"></i>
                </div>
            </div>
        </div>
    </nav>

    <!-- 主内容区 - 左右分栏 -->
    <div class="flex h-[calc(100vh-73px)]">
        <!-- 左侧：输入面板 -->
        <div class="w-1/2 border-r border-slate-200 bg-white overflow-y-auto">
            <div class="p-8 max-w-xl mx-auto">
                <h1 class="text-2xl font-bold text-slate-900 mb-2">创建你的故事</h1>
                <p class="text-slate-500 mb-8">填写下方内容，右侧实时预览故事效果</p>

                <!-- 故事创意输入 -->
                <div class="mb-8">
                    <label class="block text-sm font-semibold text-slate-700 mb-3">
                        <i data-lucide="lightbulb" class="w-4 h-4 inline mr-2 text-indigo-500"></i>
                        故事创意
                    </label>
                    <textarea
                        id="idea-input"
                        class="idea-input w-full h-32 px-4 py-3 border border-slate-200 rounded-xl text-slate-700 placeholder-slate-400 resize-none focus:outline-none focus:border-indigo-500 transition-all"
                        placeholder="描述你的故事想法...&#10;例如：一个程序员在深夜加班时，发现办公室里只有他的电脑还亮着灯，但他明明记得同事都还没走..."
                    ></textarea>
                    <div class="mt-2 text-right">
                        <span id="char-count" class="text-xs text-slate-400">0 / 500</span>
                    </div>
                </div>

                <!-- 视觉风格选择 -->
                <div class="mb-8">
                    <label class="block text-sm font-semibold text-slate-700 mb-3">
                        <i data-lucide="palette" class="w-4 h-4 inline mr-2 text-indigo-500"></i>
                        视觉风格
                    </label>
                    <div class="grid grid-cols-2 gap-3" id="style-grid">
                        <div class="style-card p-4 border-2 border-slate-200 rounded-xl cursor-pointer" data-style="realistic" data-style-name="写实摄影">
                            <div class="w-full h-20 bg-gradient-to-br from-slate-700 to-slate-900 rounded-lg mb-3 flex items-center justify-center">
                                <i data-lucide="camera" class="w-8 h-8 text-white/80"></i>
                            </div>
                            <div class="font-medium text-slate-700">写实摄影</div>
                            <div class="text-xs text-slate-400">电影质感，真实光影</div>
                        </div>
                        <div class="style-card p-4 border-2 border-slate-200 rounded-xl cursor-pointer" data-style="anime" data-style-name="日式动漫">
                            <div class="w-full h-20 bg-gradient-to-br from-pink-400 to-purple-500 rounded-lg mb-3 flex items-center justify-center">
                                <i data-lucide="star" class="w-8 h-8 text-white/80"></i>
                            </div>
                            <div class="font-medium text-slate-700">日式动漫</div>
                            <div class="text-xs text-slate-400">动漫风格，表现力强</div>
                        </div>
                        <div class="style-card p-4 border-2 border-slate-200 rounded-xl cursor-pointer" data-style="cartoon" data-style-name="3D卡通">
                            <div class="w-full h-20 bg-gradient-to-br from-amber-400 to-orange-500 rounded-lg mb-3 flex items-center justify-center">
                                <i data-lucide="box" class="w-8 h-8 text-white/80"></i>
                            </div>
                            <div class="font-medium text-slate-700">3D卡通</div>
                            <div class="text-xs text-slate-400">皮克斯风格，活泼可爱</div>
                        </div>
                        <div class="style-card p-4 border-2 border-slate-200 rounded-xl cursor-pointer" data-style="ink" data-style-name="水墨国风">
                            <div class="w-full h-20 bg-gradient-to-br from-slate-100 to-slate-300 rounded-lg mb-3 flex items-center justify-center">
                                <i data-lucide="feather" class="w-8 h-8 text-slate-600"></i>
                            </div>
                            <div class="font-medium text-slate-700">水墨国风</div>
                            <div class="text-xs text-slate-400">东方韵味，意境深远</div>
                        </div>
                    </div>
                </div>

                <!-- 情绪基调选择 -->
                <div class="mb-8">
                    <label class="block text-sm font-semibold text-slate-700 mb-3">
                        <i data-lucide="heart" class="w-4 h-4 inline mr-2 text-indigo-500"></i>
                        情绪基调
                    </label>
                    <div class="flex flex-wrap gap-2" id="mood-chips">
                        <button class="mood-chip px-4 py-2 bg-slate-100 text-slate-600 rounded-full text-sm font-medium" data-mood="温馨治愈">温馨治愈</button>
                        <button class="mood-chip px-4 py-2 bg-slate-100 text-slate-600 rounded-full text-sm font-medium" data-mood="紧张悬疑">紧张悬疑</button>
                        <button class="mood-chip px-4 py-2 bg-slate-100 text-slate-600 rounded-full text-sm font-medium" data-mood="轻松幽默">轻松幽默</button>
                        <button class="mood-chip px-4 py-2 bg-slate-100 text-slate-600 rounded-full text-sm font-medium" data-mood="浪漫甜蜜">浪漫甜蜜</button>
                        <button class="mood-chip px-4 py-2 bg-slate-100 text-slate-600 rounded-full text-sm font-medium" data-mood="热血励志">热血励志</button>
                        <button class="mood-chip px-4 py-2 bg-slate-100 text-slate-600 rounded-full text-sm font-medium" data-mood="伤感催泪">伤感催泪</button>
                    </div>
                </div>

                <!-- 配音选择 -->
                <div class="mb-8">
                    <label class="block text-sm font-semibold text-slate-700 mb-3">
                        <i data-lucide="mic" class="w-4 h-4 inline mr-2 text-indigo-500"></i>
                        旁白配音
                    </label>
                    <div class="grid grid-cols-2 gap-3" id="voice-options">
                        <div class="voice-option p-4 border-2 border-slate-200 rounded-xl cursor-pointer relative" data-voice="male-warm" data-voice-name="温暖男声">
                            <div class="voice-check hidden absolute top-2 right-2 w-5 h-5 bg-indigo-500 rounded-full items-center justify-center">
                                <i data-lucide="check" class="w-3 h-3 text-white"></i>
                            </div>
                            <div class="flex items-center gap-3">
                                <div class="w-10 h-10 bg-blue-100 rounded-full flex items-center justify-center">
                                    <i data-lucide="user" class="w-5 h-5 text-blue-600"></i>
                                </div>
                                <div>
                                    <div class="font-medium text-slate-700">温暖男声</div>
                                    <div class="text-xs text-slate-400">沉稳有磁性</div>
                                </div>
                            </div>
                        </div>
                        <div class="voice-option p-4 border-2 border-slate-200 rounded-xl cursor-pointer relative" data-voice="female-gentle" data-voice-name="温柔女声">
                            <div class="voice-check hidden absolute top-2 right-2 w-5 h-5 bg-indigo-500 rounded-full items-center justify-center">
                                <i data-lucide="check" class="w-3 h-3 text-white"></i>
                            </div>
                            <div class="flex items-center gap-3">
                                <div class="w-10 h-10 bg-pink-100 rounded-full flex items-center justify-center">
                                    <i data-lucide="user" class="w-5 h-5 text-pink-600"></i>
                                </div>
                                <div>
                                    <div class="font-medium text-slate-700">温柔女声</div>
                                    <div class="text-xs text-slate-400">甜美亲和</div>
                                </div>
                            </div>
                        </div>
                        <div class="voice-option p-4 border-2 border-slate-200 rounded-xl cursor-pointer relative" data-voice="male-storyteller" data-voice-name="故事讲述者">
                            <div class="voice-check hidden absolute top-2 right-2 w-5 h-5 bg-indigo-500 rounded-full items-center justify-center">
                                <i data-lucide="check" class="w-3 h-3 text-white"></i>
                            </div>
                            <div class="flex items-center gap-3">
                                <div class="w-10 h-10 bg-amber-100 rounded-full flex items-center justify-center">
                                    <i data-lucide="book-open" class="w-5 h-5 text-amber-600"></i>
                                </div>
                                <div>
                                    <div class="font-medium text-slate-700">故事讲述者</div>
                                    <div class="text-xs text-slate-400">娓娓道来</div>
                                </div>
                            </div>
                        </div>
                        <div class="voice-option p-4 border-2 border-slate-200 rounded-xl cursor-pointer relative" data-voice="child" data-voice-name="童声">
                            <div class="voice-check hidden absolute top-2 right-2 w-5 h-5 bg-indigo-500 rounded-full items-center justify-center">
                                <i data-lucide="check" class="w-3 h-3 text-white"></i>
                            </div>
                            <div class="flex items-center gap-3">
                                <div class="w-10 h-10 bg-green-100 rounded-full flex items-center justify-center">
                                    <i data-lucide="smile" class="w-5 h-5 text-green-600"></i>
                                </div>
                                <div>
                                    <div class="font-medium text-slate-700">童声</div>
                                    <div class="text-xs text-slate-400">活泼可爱</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 生成按钮 -->
                <button id="generate-btn" class="generate-btn w-full py-4 text-white font-semibold rounded-xl flex items-center justify-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                    <i data-lucide="wand-2" class="w-5 h-5"></i>
                    生成故事
                </button>
                <p class="text-center text-xs text-slate-400 mt-3">预计生成时间：2-3分钟</p>
            </div>
        </div>

        <!-- 右侧：实时预览面板 -->
        <div class="w-1/2 preview-panel bg-slate-50 overflow-y-auto" id="preview-panel">
            <div class="p-8">
                <!-- 空状态 -->
                <div id="empty-state" class="h-full flex flex-col items-center justify-center text-center py-20">
                    <div class="w-20 h-20 bg-slate-100 rounded-full flex items-center justify-center mb-6">
                        <i data-lucide="eye" class="w-10 h-10 text-slate-300"></i>
                    </div>
                    <h3 class="text-lg font-semibold text-slate-400 mb-2">实时预览</h3>
                    <p class="text-slate-400 text-sm max-w-xs">
                        在左侧输入你的创意，这里会实时展示故事预览效果
                    </p>
                </div>

                <!-- 预览内容（初始隐藏） -->
                <div id="preview-content" class="hidden">
                    <!-- 故事标题区 -->
                    <div id="preview-title-section" class="mb-8">
                        <div class="flex items-center gap-2 text-sm text-indigo-500 font-medium mb-2">
                            <i data-lucide="book-open" class="w-4 h-4"></i>
                            <span>故事预览</span>
                        </div>
                        <h2 id="preview-title" class="text-2xl font-bold text-slate-800 mb-2">—</h2>
                        <div id="preview-meta" class="flex items-center gap-4 text-sm text-slate-500">
                            <span id="preview-style-badge" class="px-3 py-1 bg-slate-100 rounded-full">—</span>
                            <span id="preview-mood-badge" class="px-3 py-1 bg-slate-100 rounded-full">—</span>
                        </div>
                    </div>

                    <!-- 故事概要 -->
                    <div id="preview-summary-section" class="mb-8 hidden">
                        <h3 class="text-sm font-semibold text-slate-600 mb-3 flex items-center gap-2">
                            <i data-lucide="align-left" class="w-4 h-4"></i>
                            故事概要
                        </h3>
                        <div id="preview-summary" class="p-4 bg-white rounded-xl border border-slate-200 text-slate-600 leading-relaxed">
                            根据你的创意，AI正在构思故事...
                        </div>
                    </div>

                    <!-- 角色列表 -->
                    <div id="preview-characters-section" class="mb-8 hidden">
                        <h3 class="text-sm font-semibold text-slate-600 mb-3 flex items-center gap-2">
                            <i data-lucide="users" class="w-4 h-4"></i>
                            主要角色
                        </h3>
                        <div id="preview-characters" class="flex gap-4">
                            <!-- 动态生成 -->
                        </div>
                    </div>

                    <!-- 场景列表 -->
                    <div id="preview-scenes-section" class="mb-8 hidden">
                        <h3 class="text-sm font-semibold text-slate-600 mb-3 flex items-center gap-2">
                            <i data-lucide="layout-grid" class="w-4 h-4"></i>
                            故事场景
                        </h3>
                        <div id="preview-scenes" class="space-y-3">
                            <!-- 动态生成 -->
                        </div>
                    </div>

                    <!-- 配音预览 -->
                    <div id="preview-voice-section" class="hidden">
                        <h3 class="text-sm font-semibold text-slate-600 mb-3 flex items-center gap-2">
                            <i data-lucide="mic" class="w-4 h-4"></i>
                            配音设置
                        </h3>
                        <div id="preview-voice" class="p-4 bg-white rounded-xl border border-slate-200 flex items-center gap-4">
                            <div class="w-12 h-12 bg-indigo-100 rounded-full flex items-center justify-center">
                                <i data-lucide="volume-2" class="w-6 h-6 text-indigo-600"></i>
                            </div>
                            <div>
                                <div id="preview-voice-name" class="font-medium text-slate-700">—</div>
                                <div class="text-sm text-slate-400">点击播放试听</div>
                            </div>
                            <button class="ml-auto w-10 h-10 bg-indigo-500 rounded-full flex items-center justify-center hover:bg-indigo-600 transition-colors">
                                <i data-lucide="play" class="w-5 h-5 text-white ml-0.5"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 初始化 Lucide 图标
        lucide.createIcons();

        // 状态管理
        var state = {
            idea: '',
            style: null,
            styleName: null,
            mood: null,
            voice: null,
            voiceName: null
        };

        // DOM 元素
        var ideaInput = document.getElementById('idea-input');
        var charCount = document.getElementById('char-count');
        var styleGrid = document.getElementById('style-grid');
        var moodChips = document.getElementById('mood-chips');
        var voiceOptions = document.getElementById('voice-options');
        var generateBtn = document.getElementById('generate-btn');
        var emptyState = document.getElementById('empty-state');
        var previewContent = document.getElementById('preview-content');
        var previewTitle = document.getElementById('preview-title');
        var previewStyleBadge = document.getElementById('preview-style-badge');
        var previewMoodBadge = document.getElementById('preview-mood-badge');
        var previewSummarySection = document.getElementById('preview-summary-section');
        var previewSummary = document.getElementById('preview-summary');
        var previewCharactersSection = document.getElementById('preview-characters-section');
        var previewCharacters = document.getElementById('preview-characters');
        var previewScenesSection = document.getElementById('preview-scenes-section');
        var previewScenes = document.getElementById('preview-scenes');
        var previewVoiceSection = document.getElementById('preview-voice-section');
        var previewVoiceName = document.getElementById('preview-voice-name');

        // 模拟生成的故事数据
        var mockStoryData = {
            title: '深夜的办公室',
            summary: '程序员陈默在一个深夜加班时，发现整个办公室只有自己的电脑还亮着。但他清楚记得，半小时前同事们还在讨论代码。当他起身查看时，发现了一个改变他人生的秘密...',
            characters: [
                { name: '陈默', role: '程序员', color: 'blue' },
                { name: '林晓', role: '神秘同事', color: 'purple' },
                { name: '王总', role: '老板', color: 'amber' }
            ],
            scenes: [
                { num: 1, title: '深夜的工位', desc: '空旷的办公室，只有一盏灯亮着' },
                { num: 2, title: '诡异的发现', desc: '同事的工位上留下了奇怪的便条' },
                { num: 3, title: '真相大白', desc: '原来这一切都是一场精心策划的惊喜' }
            ]
        };

        // 清空子元素
        function clearChildren(element) {
            while (element.firstChild) {
                element.removeChild(element.firstChild);
            }
        }

        // 更新预览
        function updatePreview() {
            var hasContent = state.idea.length > 0 || state.style || state.mood || state.voice;

            if (hasContent) {
                emptyState.classList.add('hidden');
                previewContent.classList.remove('hidden');
            } else {
                emptyState.classList.remove('hidden');
                previewContent.classList.add('hidden');
                return;
            }

            // 更新标题
            if (state.idea.length > 10) {
                previewTitle.textContent = mockStoryData.title;
                previewTitle.classList.add('preview-update');
                setTimeout(function() { previewTitle.classList.remove('preview-update'); }, 600);
            } else {
                previewTitle.textContent = '等待输入创意...';
            }

            // 更新风格徽章
            if (state.styleName) {
                previewStyleBadge.textContent = state.styleName;
                previewStyleBadge.className = 'px-3 py-1 bg-indigo-100 text-indigo-700 rounded-full preview-update';
                setTimeout(function() { previewStyleBadge.classList.remove('preview-update'); }, 600);
            } else {
                previewStyleBadge.textContent = '未选择风格';
                previewStyleBadge.className = 'px-3 py-1 bg-slate-100 text-slate-500 rounded-full';
            }

            // 更新情绪徽章
            if (state.mood) {
                previewMoodBadge.textContent = state.mood;
                previewMoodBadge.className = 'px-3 py-1 bg-purple-100 text-purple-700 rounded-full preview-update';
                setTimeout(function() { previewMoodBadge.classList.remove('preview-update'); }, 600);
            } else {
                previewMoodBadge.textContent = '未选择情绪';
                previewMoodBadge.className = 'px-3 py-1 bg-slate-100 text-slate-500 rounded-full';
            }

            // 显示故事概要（需要足够长的创意）
            if (state.idea.length > 20) {
                previewSummarySection.classList.remove('hidden');
                previewSummarySection.classList.add('preview-fade-in');
                previewSummary.textContent = mockStoryData.summary;
            } else {
                previewSummarySection.classList.add('hidden');
            }

            // 显示角色（需要创意+风格）
            if (state.idea.length > 20 && state.style) {
                previewCharactersSection.classList.remove('hidden');
                previewCharactersSection.classList.add('preview-fade-in');
                renderCharacters();
            } else {
                previewCharactersSection.classList.add('hidden');
            }

            // 显示场景（需要创意+风格+情绪）
            if (state.idea.length > 20 && state.style && state.mood) {
                previewScenesSection.classList.remove('hidden');
                previewScenesSection.classList.add('preview-fade-in');
                renderScenes();
            } else {
                previewScenesSection.classList.add('hidden');
            }

            // 显示配音
            if (state.voiceName) {
                previewVoiceSection.classList.remove('hidden');
                previewVoiceSection.classList.add('preview-fade-in');
                previewVoiceName.textContent = state.voiceName;
            } else {
                previewVoiceSection.classList.add('hidden');
            }

            // 更新生成按钮状态
            updateGenerateButton();
        }

        // 渲染角色
        function renderCharacters() {
            clearChildren(previewCharacters);
            var colors = {
                'blue': ['bg-blue-100', 'text-blue-600'],
                'purple': ['bg-purple-100', 'text-purple-600'],
                'amber': ['bg-amber-100', 'text-amber-600']
            };

            mockStoryData.characters.forEach(function(char, index) {
                var colorClasses = colors[char.color] || colors['blue'];
                var div = document.createElement('div');
                div.className = 'character-avatar text-center';
                div.style.animationDelay = (index * 0.1) + 's';

                var avatar = document.createElement('div');
                avatar.className = 'w-16 h-16 ' + colorClasses[0] + ' rounded-full flex items-center justify-center mx-auto mb-2';

                var icon = document.createElement('i');
                icon.setAttribute('data-lucide', 'user');
                icon.className = 'w-8 h-8 ' + colorClasses[1];
                avatar.appendChild(icon);

                var name = document.createElement('div');
                name.className = 'font-medium text-slate-700 text-sm';
                name.textContent = char.name;

                var role = document.createElement('div');
                role.className = 'text-xs text-slate-400';
                role.textContent = char.role;

                div.appendChild(avatar);
                div.appendChild(name);
                div.appendChild(role);
                previewCharacters.appendChild(div);
            });

            lucide.createIcons();
        }

        // 渲染场景
        function renderScenes() {
            clearChildren(previewScenes);

            mockStoryData.scenes.forEach(function(scene, index) {
                var div = document.createElement('div');
                div.className = 'scene-card p-4 bg-white rounded-xl border border-slate-200 flex items-start gap-4';
                div.style.animationDelay = (index * 0.1) + 's';

                var numBadge = document.createElement('div');
                numBadge.className = 'w-8 h-8 bg-indigo-500 rounded-lg flex items-center justify-center text-white font-bold text-sm flex-shrink-0';
                numBadge.textContent = scene.num;

                var content = document.createElement('div');

                var title = document.createElement('div');
                title.className = 'font-medium text-slate-700';
                title.textContent = scene.title;

                var desc = document.createElement('div');
                desc.className = 'text-sm text-slate-400 mt-1';
                desc.textContent = scene.desc;

                content.appendChild(title);
                content.appendChild(desc);
                div.appendChild(numBadge);
                div.appendChild(content);
                previewScenes.appendChild(div);
            });
        }

        // 更新生成按钮状态
        function updateGenerateButton() {
            var canGenerate = state.idea.length > 10 && state.style && state.mood && state.voice;
            generateBtn.disabled = !canGenerate;
        }

        // 事件监听：创意输入
        ideaInput.addEventListener('input', function() {
            state.idea = this.value;
            charCount.textContent = this.value.length + ' / 500';
            updatePreview();
        });

        // 事件监听：风格选择
        styleGrid.querySelectorAll('.style-card').forEach(function(card) {
            card.addEventListener('click', function() {
                styleGrid.querySelectorAll('.style-card').forEach(function(c) {
                    c.classList.remove('selected');
                });
                this.classList.add('selected');
                state.style = this.getAttribute('data-style');
                state.styleName = this.getAttribute('data-style-name');
                updatePreview();
            });
        });

        // 事件监听：情绪选择
        moodChips.querySelectorAll('.mood-chip').forEach(function(chip) {
            chip.addEventListener('click', function() {
                moodChips.querySelectorAll('.mood-chip').forEach(function(c) {
                    c.classList.remove('selected');
                });
                this.classList.add('selected');
                state.mood = this.getAttribute('data-mood');
                updatePreview();
            });
        });

        // 事件监听：配音选择
        voiceOptions.querySelectorAll('.voice-option').forEach(function(option) {
            option.addEventListener('click', function() {
                voiceOptions.querySelectorAll('.voice-option').forEach(function(o) {
                    o.classList.remove('selected');
                });
                this.classList.add('selected');
                state.voice = this.getAttribute('data-voice');
                state.voiceName = this.getAttribute('data-voice-name');
                updatePreview();
            });
        });

        // 生成按钮点击
        generateBtn.addEventListener('click', function() {
            if (!this.disabled) {
                alert('开始生成故事！\n\n创意：' + state.idea.substring(0, 30) + '...\n风格：' + state.styleName + '\n情绪：' + state.mood + '\n配音：' + state.voiceName);
            }
        });
    </script>
</body>
</html>
